<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - SkillSphere</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

<!-- 🔹 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark glass-nav sticky-top shadow-sm py-3 z-3">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4 brand-font text-white d-flex align-items-center gap-2" href="index.html">
            <i data-lucide="compass" class="text-primary" style="width: 28px; height: 28px;"></i>
            SkillSphere
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <i data-lucide="menu" class="text-white"></i>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
                <li class="nav-item">
                    <a class="nav-link fw-medium px-3 rounded-pill hover-bg-light text-white" href="index.html">Workshops</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active bg-white text-dark fw-medium px-4 rounded-pill shadow-sm" href="my-bookings.html">My Bookings</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- 🔹 MAIN CONTAINER -->
<div class="container mt-5 mb-5 pb-5 fade-in-up">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end mb-4 gap-3 border-bottom pb-4">
        <div>
            <h2 class="fw-bold brand-font mb-1">My Bookings</h2>
            <p class="text-muted mb-0">Track and manage your upcoming workshop sessions.</p>
        </div>
        <a href="index.html" class="btn btn-outline-primary rounded-pill px-4 shadow-sm d-flex align-items-center gap-2">
            <i data-lucide="search" style="width: 18px; height: 18px;"></i> Find Workshops
        </a>
    </div>

    <!-- 📌 BOOKING LIST -->
    <div class="row g-4" id="bookingList">
        <!-- Dynamic booking cards will be inserted here -->
        <div class="col-12 text-center py-5" id="loadingBookings">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="text-muted mt-3 fw-medium">Loading your bookings...</p>
        </div>
    </div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="js/my-bookings.js"></script>

<!-- Initialize Lucide Icons -->
<script>
    lucide.createIcons();
    
    // Add some styling enhancements to dynamically loaded cards
    // We observe the DOM for changes to apply classes
    const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
            if (mutation.addedNodes.length) {
                $('.card').addClass('shadow-soft border-0 rounded-4 h-100');
                $('.card-header').addClass('bg-white border-bottom-0 pt-4 px-4 pb-0 fw-bold brand-font fs-5');
                $('.card-body').addClass('p-4');
                $('.card-footer').addClass('bg-light border-top-0 rounded-bottom-4 p-3 d-flex justify-content-between align-items-center');
                
                // Enhance card content
                $('.card-title').addClass('fw-bold brand-font');
                
                // Note: The actual structure of the card comes from my-bookings.js
                // This is a progressive enhancement approach
            }
        });
    });
    
    observer.observe(document.getElementById('bookingList'), { childList: true });
</script>

</body>
</html>
