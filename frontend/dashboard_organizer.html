<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizer Dashboard - SkillSphere</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="#">SkillSphere Organizer</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" id="navMyWorkshops">My Workshops</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="navViewBookings">View Bookings</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <span class="text-light me-3" id="welcomeMessage">Welcome, Organizer</span>
                    <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Dashboard Alert -->
        <div id="dashboardAlert" class="alert d-none" role="alert"></div>

        <!-- MY WORKSHOPS VIEW -->
        <div id="myWorkshopsView">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold mb-0">My Workshops</h3>
                <button class="btn btn-primary rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#createWorkshopModal">
                    <i class="bi bi-plus-circle"></i> Create Workshop
                </button>
            </div>
            <div class="alert alert-info small rounded-3 shadow-sm">
                <i class="bi bi-info-circle me-1"></i> Note: Currently displaying all <b>approved</b> platform workshops below due to backend constraints. We are filtering locally where possible.
            </div>
            <div class="row" id="workshopsList">
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
        </div>

        <!-- VIEW BOOKINGS VIEW -->
        <div id="viewBookingsView" class="d-none">
            <h3 class="fw-bold mb-4">Attendees & Bookings</h3>
            <div class="row" id="attendeesList">
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- Create Workshop Modal -->
    <div class="modal fade" id="createWorkshopModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title fw-bold">Create New Workshop</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="createAlert" class="alert d-none"></div>
                    <form id="createForm">
                        <div class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Title</label>
                                <input type="text" class="form-control" id="wsTitle" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Description</label>
                                <textarea class="form-control" id="wsDescription" rows="3" required></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">City</label>
                                <select class="form-select" id="wsCity" required>
                                    <option value="">Loading cities...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Date & Time</label>
                                <input type="datetime-local" class="form-control" id="wsDate" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Price (₹)</label>
                                <input type="number" class="form-control" id="wsPrice" step="0.01" min="0" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Seat Limit</label>
                                <input type="number" class="form-control" id="wsSeatLimit" min="1" required>
                            </div>
                        </div>
                        <div class="mt-4 pt-3 border-top text-end">
                            <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary rounded-pill px-4 ms-2" id="createBtn">Create Workshop</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- Edit Workshop Modal -->
    <div class="modal fade" id="editWorkshopModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title fw-bold">Edit Workshop</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="editAlert" class="alert d-none"></div>
                    <form id="editForm">
                        <input type="hidden" id="editWsId">
                        <div class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Title</label>
                                <input type="text" class="form-control" id="editWsTitle" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Description</label>
                                <textarea class="form-control" id="editWsDescription" rows="3" required></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">City</label>
                                <select class="form-select" id="editWsCity" required>
                                    <option value="">Loading cities...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Date & Time</label>
                                <input type="datetime-local" class="form-control" id="editWsDate" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Price (₹)</label>
                                <input type="number" class="form-control" id="editWsPrice" step="0.01" min="0" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Seat Limit</label>
                                <input type="number" class="form-control" id="editWsSeatLimit" min="1" required>
                            </div>
                        </div>
                        <div class="mt-4 pt-3 border-top text-end">
                            <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-warning text-dark fw-bold rounded-pill px-4 ms-2" id="editBtn">Update Workshop</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/organizer.js"></script>
</body>
</html>
