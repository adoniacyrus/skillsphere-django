<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizer Dashboard - SkillSphere</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark glass-nav sticky-top shadow-sm py-3 z-3">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold fs-4 brand-font text-white d-flex align-items-center gap-2" href="#">
                <i data-lucide="compass" class="text-primary" style="width: 28px; height: 28px;"></i>
                SkillSphere <span class="badge bg-primary fs-6 ms-2 rounded-pill">Organizer</span>
            </a>
            
            <!-- Mobile Menu Toggle (Triggers Sidebar) -->
            <button class="navbar-toggler border-0 d-md-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
                <i data-lucide="menu" class="text-white"></i>
            </button>
            
            <div class="d-none d-md-flex align-items-center gap-3">
                <span class="text-light fw-medium" id="welcomeMessage">Welcome, Organizer</span>
                <button class="btn btn-outline-light btn-sm rounded-pill px-4" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Mobile Sidebar (Offcanvas) -->
    <div class="offcanvas offcanvas-start bg-white" tabindex="-1" id="mobileSidebar">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold brand-font text-primary">Menu</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <ul class="nav flex-column gap-2">
                <li class="nav-item">
                    <a class="nav-link active rounded text-dark fw-medium p-3 d-flex align-items-center gap-3 bg-light" href="#" id="navMyWorkshopsMobile" data-bs-dismiss="offcanvas">
                        <i data-lucide="layers" class="text-primary"></i> My Workshops
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link rounded text-muted fw-medium p-3 d-flex align-items-center gap-3 hover-bg-light" href="#" id="navViewBookingsMobile" data-bs-dismiss="offcanvas">
                        <i data-lucide="users" class="text-secondary"></i> View Bookings
                    </a>
                </li>
                <li class="nav-item mt-4 pt-4 border-top">
                    <button class="btn btn-outline-danger w-100 rounded-pill d-flex align-items-center justify-content-center gap-2" id="logoutBtnMobile">
                        <i data-lucide="log-out"></i> Logout
                    </button>
                </li>
            </ul>
        </div>
    </div>

    <div class="container-fluid">
        <div class="row">
            <!-- Desktop Sidebar -->
            <div class="col-md-3 col-lg-2 p-0 sidebar bg-white d-none d-md-block shadow-sm">
                <div class="p-4">
                    <p class="text-muted small fw-bold text-uppercase mb-3" style="letter-spacing: 1px;">Dashboard</p>
                    <ul class="nav flex-column gap-2">
                        <li class="nav-item">
                            <a class="nav-link active" href="#" id="navMyWorkshops">
                                <i data-lucide="layers" style="width: 20px; height: 20px;"></i> My Workshops
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="navViewBookings">
                                <i data-lucide="users" style="width: 20px; height: 20px;"></i> View Bookings
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
            
            <!-- Main Content -->
            <div class="col-md-9 col-lg-10 p-4 p-lg-5">
                <!-- Dashboard Alert -->
                <div id="dashboardAlert" class="alert d-none rounded-3 shadow-sm border-0" role="alert"></div>



                <!-- MY WORKSHOPS VIEW -->
                <div id="myWorkshopsView" class="fade-in-up delay-1">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
                        <div>
                            <h3 class="fw-bold brand-font mb-1">My Workshops</h3>
                            <p class="text-muted mb-0">Manage and create new workshops.</p>
                        </div>
                        <button class="btn btn-primary rounded-pill px-4 shadow-sm d-flex align-items-center gap-2" data-bs-toggle="modal" data-bs-target="#createWorkshopModal">
                            <i data-lucide="plus-circle" style="width: 20px; height: 20px;"></i> Create Workshop
                        </button>
                    </div>
                    

                    
                    <div class="row g-4" id="workshopsList">
                        <div class="col-12 text-center py-5">
                            <div class="spinner-border text-primary" role="status"></div>
                        </div>
                    </div>
                </div>

                <!-- VIEW BOOKINGS VIEW -->
                <div id="viewBookingsView" class="d-none fade-in-up">
                    <div class="mb-4">
                        <h3 class="fw-bold brand-font mb-1">Attendees & Bookings</h3>
                        <p class="text-muted mb-0">View all bookings for your workshops.</p>
                    </div>
                    <div class="card shadow-soft border-0 rounded-4 overflow-hidden bg-white p-2">
                        <div class="row" id="attendeesList">
                            <div class="col-12 text-center py-5">
                                <div class="spinner-border text-primary" role="status"></div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Create Workshop Modal -->
    <div class="modal fade" id="createWorkshopModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content rounded-4 border-0 shadow-lg">
                <div class="modal-header border-bottom px-4 py-3 bg-light rounded-top-4">
                    <h5 class="modal-title fw-bold brand-font text-dark d-flex align-items-center gap-2">
                        <i data-lucide="plus-square" class="text-primary"></i> Create New Workshop
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div id="createAlert" class="alert d-none rounded-3"></div>
                    <form id="createForm">
                        <div class="row g-4">
                            <div class="col-md-12">
                                <label class="form-label fw-semibold text-dark">Title</label>
                                <input type="text" class="form-control bg-light" id="wsTitle" placeholder="E.g. Pottery for Beginners" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-semibold text-dark">Description</label>
                                <textarea class="form-control bg-light" id="wsDescription" rows="3" placeholder="Describe what attendees will learn..." required></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-dark">City</label>
                                <select class="form-select bg-light" id="wsCity" required>
                                    <option value="">Loading cities...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-dark">Date & Time</label>
                                <input type="datetime-local" class="form-control bg-light" id="wsDate" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-dark">Price (₹)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted border-end-0">₹</span>
                                    <input type="number" class="form-control bg-light border-start-0 ps-0" id="wsPrice" step="0.01" min="0" placeholder="0.00" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-dark">Seat Limit</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted border-end-0"><i data-lucide="users" style="width: 18px; height: 18px;"></i></span>
                                    <input type="number" class="form-control bg-light border-start-0 ps-0" id="wsSeatLimit" min="1" placeholder="Max attendees" required>
                                </div>
                            </div>
                        </div>
                        <div class="mt-5 pt-4 border-top d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-light rounded-pill px-4 shadow-sm" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary rounded-pill px-4 shadow-sm fw-bold" id="createBtn">Create Workshop</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Workshop Modal -->
    <div class="modal fade" id="editWorkshopModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content rounded-4 border-0 shadow-lg">
                <div class="modal-header border-bottom px-4 py-3 bg-light rounded-top-4">
                    <h5 class="modal-title fw-bold brand-font text-dark d-flex align-items-center gap-2">
                        <i data-lucide="edit-3" class="text-warning"></i> Edit Workshop
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div id="editAlert" class="alert d-none rounded-3"></div>
                    <form id="editForm">
                        <input type="hidden" id="editWsId">
                        <div class="row g-4">
                            <div class="col-md-12">
                                <label class="form-label fw-semibold text-dark">Title</label>
                                <input type="text" class="form-control bg-light" id="editWsTitle" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-semibold text-dark">Description</label>
                                <textarea class="form-control bg-light" id="editWsDescription" rows="3" required></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-dark">City</label>
                                <select class="form-select bg-light" id="editWsCity" required>
                                    <option value="">Loading cities...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-dark">Date & Time</label>
                                <input type="datetime-local" class="form-control bg-light" id="editWsDate" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-dark">Price (₹)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted border-end-0">₹</span>
                                    <input type="number" class="form-control bg-light border-start-0 ps-0" id="editWsPrice" step="0.01" min="0" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-dark">Seat Limit</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted border-end-0"><i data-lucide="users" style="width: 18px; height: 18px;"></i></span>
                                    <input type="number" class="form-control bg-light border-start-0 ps-0" id="editWsSeatLimit" min="1" required>
                                </div>
                            </div>
                        </div>
                        <div class="mt-5 pt-4 border-top d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-light rounded-pill px-4 shadow-sm" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-warning text-dark fw-bold rounded-pill px-4 shadow-sm" id="editBtn">Update Workshop</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/organizer.js"></script>
    
    <!-- Initialize Lucide Icons & Chart Placeholder -->
    <script>
        lucide.createIcons();
        
        // Setup mobile sidebar links
        $(document).ready(function() {
            $('#navMyWorkshopsMobile').click(function(e) {
                e.preventDefault();
                $('#navMyWorkshops').click();
                $(this).addClass('active bg-light text-dark').removeClass('text-muted hover-bg-light');
                $('#navViewBookingsMobile').removeClass('active bg-light text-dark').addClass('text-muted hover-bg-light');
            });
            
            $('#navViewBookingsMobile').click(function(e) {
                e.preventDefault();
                $('#navViewBookings').click();
                $(this).addClass('active bg-light text-dark').removeClass('text-muted hover-bg-light');
                $('#navMyWorkshopsMobile').removeClass('active bg-light text-dark').addClass('text-muted hover-bg-light');
            });
            
            $('#logoutBtnMobile').click(function() {
                $('#logoutBtn').click();
            });

            // Initialize placeholder chart
            const ctx = document.getElementById('earningsChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{
                        label: 'Earnings (₹)',
                        data: [1200, 1900, 3000, 5000, 2000, 3000],
                        borderColor: '#4F46E5',
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { borderDash: [2, 4] } },
                        x: { grid: { display: false } }
                    }
                }
            });
        });
    </script>
</body>
</html>
