<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SkillSphere</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="#"><i class="bi bi-shield-lock me-2"></i>SkillSphere Admin</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="#" id="navUsers">Users</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="navWorkshops">Workshops</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="navCities">Cities</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="navBookings">Bookings</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <span class="text-light me-3" id="welcomeMessage">Welcome, Admin</span>
                    <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Removed API Limitation Notice as backend was updated -->

        <!-- USERS VIEW -->
        <div id="usersView">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold mb-0">Manage Users</h3>
                <select id="userRoleFilter" class="form-select w-auto rounded-pill shadow-sm">
                    <option value="">All Roles</option>
                    <option value="admin">Admin</option>
                    <option value="organizer">Organizer</option>
                    <option value="user">Attendee</option>
                </select>
            </div>
            <div class="row" id="adminUsersList">
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-danger" role="status"></div>
                </div>
            </div>
        </div>

        <!-- WORKSHOPS VIEW -->
        <div id="workshopsView" class="d-none">
            <h3 class="fw-bold mb-4">Manage Workshops</h3>
            <div class="row" id="adminWorkshopsList">
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-danger" role="status"></div>
                </div>
            </div>
        </div>

        <!-- CITIES VIEW -->
        <div id="citiesView" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold mb-0">Manage Cities</h3>
                <button class="btn btn-danger rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#addCityModal">
                    <i class="bi bi-plus-circle"></i> Add City
                </button>
            </div>
            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                <ul class="list-group list-group-flush" id="citiesList">
                    <div class="text-center py-5"><div class="spinner-border text-danger" role="status"></div></div>
                </ul>
            </div>
        </div>

        <!-- BOOKINGS VIEW -->
        <div id="bookingsView" class="d-none">
            <h3 class="fw-bold mb-4">Platform-Wide Bookings</h3>
            <div class="row" id="adminBookingsList">
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-danger" role="status"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- Add City Modal -->
    <div class="modal fade" id="addCityModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title fw-bold">Add New City</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="addCityAlert" class="alert d-none"></div>
                    <form id="addCityForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">City Name</label>
                            <input type="text" class="form-control" id="cityName" required>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 rounded-pill py-2" id="addCityBtn">Add City</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
