<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SkillSphere</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .split-bg {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.7), rgba(79, 70, 229, 0.8)), url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1920&q=80') center/cover;
        }
        .form-control, .form-select {
            padding: 0.8rem 1rem;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
        }
        .form-control:focus, .form-select:focus {
            background-color: #fff;
            border-color: var(--primary-indigo);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
        .input-group-text {
            background-color: #f8fafc;
            border-color: #e2e8f0;
        }
        /* Custom scrollbar for form side if needed */
        .scrollable-side {
            max-height: 100vh;
            overflow-y: auto;
        }
    </style>
</head>
<body class="bg-white">

    <div class="container-fluid p-0">
        <div class="row g-0 min-vh-100">
            <!-- Left Side: Branding -->
            <div class="col-lg-5 col-xl-6 d-none d-lg-flex flex-column justify-content-between p-5 text-white split-bg position-relative overflow-hidden">
                <div class="position-relative z-1 fade-in-up">
                    <a href="index.html" class="text-decoration-none d-inline-flex align-items-center gap-2 mb-3 text-white">
                        <div class="bg-white p-2 rounded-3 shadow-sm d-flex align-items-center justify-content-center">
                            <i data-lucide="compass" class="text-primary" style="width: 24px; height: 24px;"></i>
                        </div>
                        <h3 class="fw-bold mb-0 brand-font">SkillSphere</h3>
                    </a>
                </div>
                
                <div class="position-relative z-1 fade-in-up delay-1 mb-5 pb-5">
                    <span class="badge bg-white bg-opacity-25 text-white rounded-pill px-3 py-2 mb-4 fs-6 border border-white border-opacity-50 glass-card">
                        <i data-lucide="sparkles" class="d-inline-block align-text-bottom me-1" style="width: 16px; height: 16px;"></i>
                        Join the Community
                    </span>
                    <h1 class="display-4 fw-bold brand-font lh-sm mb-4 text-white">Discover & Host Incredible Workshops</h1>
                    <p class="lead text-white text-opacity-75" style="max-width: 480px;">Connect with local experts, learn new skills, or share your passion with the world. Your journey starts here.</p>
                </div>
            </div>

            <!-- Right Side: Form -->
            <div class="col-lg-7 col-xl-6 d-flex align-items-center justify-content-center bg-white p-4 p-sm-5 scrollable-side">
                <div class="w-100 fade-in-up delay-2" style="max-width: 420px;">
                    <!-- Mobile Logo -->
                    <div class="text-center d-lg-none mb-5">
                        <a href="index.html" class="text-decoration-none d-inline-flex align-items-center gap-2">
                            <div class="bg-primary bg-opacity-10 p-2 rounded-3">
                                <i data-lucide="compass" class="text-primary" style="width: 28px; height: 28px;"></i>
                            </div>
                            <h2 class="fw-bold text-dark mb-0 brand-font">SkillSphere</h2>
                        </a>
                    </div>
                    
                    <div class="mb-5">
                        <h2 class="fw-bold brand-font text-dark mb-2">Create an Account</h2>
                        <p class="text-muted">Enter your details to get started.</p>
                    </div>

                    <div id="registerAlert" class="alert d-none rounded-3 shadow-sm border-0" role="alert"></div>

                    <form id="registerForm">
                        <div class="mb-4">
                            <label for="username" class="form-label fw-semibold text-dark small text-uppercase" style="letter-spacing: 0.5px;">Username</label>
                            <div class="input-group input-group-lg shadow-sm rounded-3">
                                <span class="input-group-text border-end-0 text-muted px-3"><i data-lucide="user" style="width: 20px; height: 20px;"></i></span>
                                <input type="text" class="form-control border-start-0 ps-0 fs-6" id="username" name="username" placeholder="Choose a username" required>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label for="email" class="form-label fw-semibold text-dark small text-uppercase" style="letter-spacing: 0.5px;">Email address</label>
                            <div class="input-group input-group-lg shadow-sm rounded-3">
                                <span class="input-group-text border-end-0 text-muted px-3"><i data-lucide="mail" style="width: 20px; height: 20px;"></i></span>
                                <input type="email" class="form-control border-start-0 ps-0 fs-6" id="email" name="email" placeholder="name@example.com" required>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold text-dark small text-uppercase" style="letter-spacing: 0.5px;">Password</label>
                            <div class="input-group input-group-lg shadow-sm rounded-3">
                                <span class="input-group-text border-end-0 text-muted px-3"><i data-lucide="lock" style="width: 20px; height: 20px;"></i></span>
                                <input type="password" class="form-control border-start-0 ps-0 fs-6" id="password" name="password" placeholder="Create a password" required minlength="8">
                            </div>
                        </div>
                        
                        <div class="mb-5">
                            <label for="role" class="form-label fw-semibold text-dark small text-uppercase" style="letter-spacing: 0.5px;">Account Type</label>
                            <select class="form-select form-select-lg shadow-sm rounded-3 fs-6 fw-medium" id="role" name="role" required>
                                <option value="user" selected>I want to attend workshops</option>
                                <option value="organizer">I want to organize workshops</option>
                            </select>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-3 rounded-3 fw-bold mb-4 shadow-sm fs-6 d-flex justify-content-center align-items-center gap-2" id="registerBtn">
                            <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true" id="registerSpinner"></span>
                            Sign Up
                            <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>
                        </button>
                        
                        <div class="text-center">
                            <p class="mb-0 text-muted fw-medium">Already have an account? <a href="login.html" class="text-primary text-decoration-none fw-bold hover-text-dark transition-all">Log in</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/auth.js"></script>
    
    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
