<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Organizer Dashboard - SkillSphere</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- 🔹 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">SkillSphere <span class="badge bg-warning text-dark ms-2">Organizer</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Workshops</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="my-bookings.html">My Bookings</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="organizer.html">Dashboard</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- 🔹 MAIN CONTAINER -->
<div class="container mt-4">
    <div class="row">
        <!-- 📝 CREATE WORKSHOP FORM -->
        <div class="col-lg-4 mb-4">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Create Workshop</h5>
                </div>
                <div class="card-body">
                    <form id="createWorkshopForm">
                        <div class="mb-3">
                            <label for="title" class="form-label">Title</label>
                            <input type="text" class="form-control" id="title" required>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="city" class="form-label">City</label>
                            <select class="form-select" id="city" required>
                                <option value="">Select City...</option>
                                <!-- Populated dynamically -->
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="date" class="form-label">Date & Time</label>
                            <input type="datetime-local" class="form-control" id="date" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="price" class="form-label">Price ($)</label>
                                <input type="number" step="0.01" min="0" class="form-control" id="price" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="seat_limit" class="form-label">Seat Limit</label>
                                <input type="number" min="1" class="form-control" id="seat_limit" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" id="btnCreate">Create Workshop</button>
                    </form>
                    <div id="formMessage" class="mt-3"></div>
                </div>
            </div>
        </div>

        <!-- 📌 ORGANIZER BOOKINGS -->
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Bookings for My Workshops</h5>
                    <button class="btn btn-sm btn-light" id="btnRefreshBookings"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Workshop</th>
                                    <th>User Email</th>
                                    <th>Seats</th>
                                    <th>Total ($)</th>
                                    <th>Booked On</th>
                                </tr>
                            </thead>
                            <tbody id="organizerBookingsList">
                                <tr><td colspan="5" class="text-center py-4 text-muted">Loading bookings...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="js/organizer.js"></script>

</body>
</html>
