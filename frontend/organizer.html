<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizer Hub - SkillSphere</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

<!-- 🔹 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark glass-nav sticky-top shadow-sm py-3 z-3">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4 brand-font text-white d-flex align-items-center gap-2" href="index.html">
            <i data-lucide="compass" class="text-primary" style="width: 28px; height: 28px;"></i>
            SkillSphere <span class="badge bg-warning text-dark fs-6 ms-2 rounded-pill">Organizer</span>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <i data-lucide="menu" class="text-white"></i>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
                <li class="nav-item">
                    <a class="nav-link fw-medium px-3 rounded-pill hover-bg-light text-white" href="index.html">Workshops</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link fw-medium px-3 rounded-pill hover-bg-light text-white" href="my-bookings.html">My Bookings</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active bg-white text-dark fw-medium px-4 rounded-pill shadow-sm" href="organizer.html">Dashboard</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- 🔹 MAIN CONTAINER -->
<div class="container mt-5 mb-5 pb-5 fade-in-up">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end mb-4 gap-3 border-bottom pb-4">
        <div>
            <h2 class="fw-bold brand-font mb-1">Organizer Hub</h2>
            <p class="text-muted mb-0">Manage your workshops and view recent bookings.</p>
        </div>
    </div>

    <div class="row g-4">
        <!-- 📝 CREATE WORKSHOP FORM -->
        <div class="col-lg-4 mb-4">
            <div class="card shadow-soft border-0 rounded-4 overflow-hidden h-100 bg-white">
                <div class="card-header bg-primary bg-gradient text-white border-bottom-0 py-3 px-4 d-flex align-items-center gap-2">
                    <i data-lucide="plus-circle"></i>
                    <h5 class="mb-0 fw-bold brand-font">Create Workshop</h5>
                </div>
                <div class="card-body p-4 bg-light bg-opacity-50">
                    <form id="createWorkshopForm">
                        <div class="mb-3">
                            <label for="title" class="form-label fw-semibold text-dark small">Title</label>
                            <input type="text" class="form-control bg-white" id="title" placeholder="Workshop Title" required>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label fw-semibold text-dark small">Description</label>
                            <textarea class="form-control bg-white" id="description" rows="3" placeholder="What will they learn?" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="city" class="form-label fw-semibold text-dark small">City</label>
                            <select class="form-select bg-white" id="city" required>
                                <option value="">Select City...</option>
                                <!-- Populated dynamically -->
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="date" class="form-label fw-semibold text-dark small">Date & Time</label>
                            <input type="datetime-local" class="form-control bg-white" id="date" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="price" class="form-label fw-semibold text-dark small">Price (₹)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white text-muted border-end-0">₹</span>
                                    <input type="number" step="0.01" min="0" class="form-control bg-white border-start-0 ps-0" id="price" placeholder="0.00" required>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="seat_limit" class="form-label fw-semibold text-dark small">Seat Limit</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white text-muted border-end-0"><i data-lucide="users" style="width: 16px; height: 16px;"></i></span>
                                    <input type="number" min="1" class="form-control bg-white border-start-0 ps-0" id="seat_limit" placeholder="Max" required>
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold shadow-sm mt-2" id="btnCreate">Create Workshop</button>
                    </form>
                    <div id="formMessage" class="mt-3"></div>
                </div>
            </div>
        </div>

        <!-- 📌 ORGANIZER BOOKINGS -->
        <div class="col-lg-8">
            <div class="card shadow-soft border-0 rounded-4 overflow-hidden h-100 bg-white">
                <div class="card-header bg-white border-bottom py-4 px-4 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 fw-bold brand-font text-dark d-flex align-items-center gap-2">
                        <i data-lucide="list-checks" class="text-success"></i> Bookings for My Workshops
                    </h5>
                    <button class="btn btn-sm btn-outline-secondary rounded-pill px-3 d-flex align-items-center gap-2" id="btnRefreshBookings">
                        <i data-lucide="refresh-cw" style="width: 14px; height: 14px;"></i> Refresh
                    </button>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4 text-muted fw-semibold small text-uppercase" style="letter-spacing: 0.5px;">Workshop</th>
                                    <th class="text-muted fw-semibold small text-uppercase" style="letter-spacing: 0.5px;">User Email</th>
                                    <th class="text-muted fw-semibold small text-uppercase" style="letter-spacing: 0.5px;">Seats</th>
                                    <th class="text-muted fw-semibold small text-uppercase" style="letter-spacing: 0.5px;">Total (₹)</th>
                                    <th class="pe-4 text-muted fw-semibold small text-uppercase" style="letter-spacing: 0.5px;">Booked On</th>
                                </tr>
                            </thead>
                            <tbody id="organizerBookingsList">
                                <tr>
                                    <td colspan="5" class="text-center py-5">
                                        <div class="spinner-border text-primary" role="status"></div>
                                        <p class="text-muted mt-3 mb-0 fw-medium">Loading bookings...</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Initialize Lucide Icons -->
<script>
    lucide.createIcons();
    
    // Add custom styling observer for table rows if needed
    const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
            if (mutation.addedNodes.length) {
                $('#organizerBookingsList tr').addClass('bg-white');
                $('#organizerBookingsList td:first-child').addClass('ps-4 fw-medium text-dark');
                $('#organizerBookingsList td:last-child').addClass('pe-4 text-muted small');
                $('#organizerBookingsList td:nth-child(2)').addClass('text-muted');
                $('#organizerBookingsList td:nth-child(4)').addClass('fw-bold text-success');
            }
        });
    });
    
    observer.observe(document.getElementById('organizerBookingsList'), { childList: true });
</script>

<!-- Custom JS -->
<script src="js/organizer.js"></script>

</body>
</html>
