<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - SkillSphere</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="#">SkillSphere</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" id="navWorkshops">Browse Workshops</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="navMyBookings">My Bookings</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <span class="text-light me-3" id="welcomeMessage">Welcome, User</span>
                    <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Dashboard Alert -->
        <div id="dashboardAlert" class="alert d-none" role="alert"></div>

        <!-- PROFILE SECTION -->
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body d-flex justify-content-between align-items-center bg-light">
                        <div>
                            <h5 class="mb-0 fw-bold">My Profile</h5>
                            <small class="text-muted" id="userInfoText">Loading...</small>
                        </div>
                        <div class="d-flex align-items-center">
                            <select id="preferredCitySelect" class="form-select form-select-sm me-2" style="width: auto;">
                                <option value="">Select Preferred City</option>
                            </select>
                            <button id="setCityBtn" class="btn btn-primary btn-sm rounded-pill px-3">Save City</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- BROWSE WORKSHOPS VIEW -->
        <div id="browseWorkshopsView">
            <div class="row mb-4">
                <div class="col-md-4 mb-2">
                    <input type="text" id="searchWorkshop" class="form-control rounded-pill" placeholder="Search by title...">
                </div>
                <div class="col-md-3 mb-2">
                    <select id="filterCity" class="form-select rounded-pill">
                        <option value="">All Cities</option>
                    </select>
                </div>
                <div class="col-md-3 mb-2">
                    <select id="sortWorkshop" class="form-select rounded-pill">
                        <option value="">Sort By</option>
                        <option value="price">Price (Low to High)</option>
                        <option value="-price">Price (High to Low)</option>
                        <option value="date">Date (Earliest First)</option>
                        <option value="-date">Date (Latest First)</option>
                    </select>
                </div>
                <div class="col-md-2 mb-2">
                    <button id="applyFiltersBtn" class="btn btn-dark w-100 rounded-pill">Apply</button>
                </div>
            </div>

            <div class="row" id="workshopList">
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
            
            <div class="text-center mt-3 d-none" id="paginationControls">
                <button class="btn btn-outline-primary rounded-pill me-2" id="prevPageBtn">Previous</button>
                <button class="btn btn-outline-primary rounded-pill" id="nextPageBtn">Next</button>
            </div>
        </div>

        <!-- MY BOOKINGS VIEW -->
        <div id="myBookingsView" class="d-none">
            <h3 class="fw-bold mb-4">My Bookings</h3>
            <div class="row" id="bookingsList">
                <!-- Bookings rendered here -->
            </div>
        </div>

    </div>

    <!-- Book Workshop Modal -->
    <div class="modal fade" id="bookModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title fw-bold">Book Workshop</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="bookAlert" class="alert d-none"></div>
                    <h6 id="bookWorkshopTitle" class="fw-bold text-primary"></h6>
                    <p class="mb-1 text-muted small"><i class="bi bi-geo-alt"></i> <span id="bookWorkshopCity"></span></p>
                    <p class="mb-3 text-muted small"><i class="bi bi-tag"></i> ₹<span id="bookWorkshopPrice"></span> per seat</p>
                    
                    <form id="bookForm">
                        <input type="hidden" id="bookWorkshopId">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Number of Seats</label>
                            <input type="number" class="form-control" id="bookSeats" min="1" value="1" required>
                            <small class="text-muted">Available: <span id="bookAvailableSeats"></span></small>
                        </div>
                        <div class="mb-3 p-3 bg-light rounded-3 text-center">
                            <span class="fw-semibold">Total Price: </span>
                            <span class="fw-bold text-success fs-5">₹<span id="bookTotalPrice">0.00</span></span>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2" id="confirmBookBtn">Confirm Booking</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/user.js"></script>
</body>
</html>
